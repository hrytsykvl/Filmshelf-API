name: CI/CD - Build and Deploy to Azure Container Apps

on:
  push:
    branches: ["**"]

env:
  DOTNET_VERSION: "8.0.x"
  ACR_NAME: filmshelfacr
  ACR_LOGIN_SERVER: filmshelfacr.azurecr.io
  IMAGE_NAME: filmshelf-api
  RESOURCE_GROUP: filmshelf
  CONTAINER_APP_NAME: filmshelf-api

jobs:
  build:
    name: Build & Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore FilmShelf/FilmShelf.sln

      - name: Build
        run: dotnet build FilmShelf/FilmShelf.sln --configuration Release --no-restore

  migrate:
    name: Run EF Migrations
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install EF Core tools
        run: dotnet tool install --global dotnet-ef --version 8.*

      - name: Restore dependencies
        run: dotnet restore FilmShelf/FilmShelf.sln

      - name: Create migration bundle
        run: |
          dotnet ef migrations bundle \
            --project FilmShelf/FilmShelf.DAL/FilmShelf.DAL.csproj \
            --startup-project FilmShelf/FilmShelf.API/FilmShelf.API.csproj \
            --configuration Release \
            --output efbundle \
            --self-contained

      - name: Apply migrations
        run: ./efbundle --connection "${{ secrets.DB_CONNECTION_STRING }}"

  deploy:
    name: Build Image & Deploy
    runs-on: ubuntu-latest
    needs: [build, migrate]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push Docker image
        run: |
          docker build \
            -t ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest \
            -f FilmShelf/FilmShelf.API/Dockerfile \
            FilmShelf/

          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Azure Container Apps
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
