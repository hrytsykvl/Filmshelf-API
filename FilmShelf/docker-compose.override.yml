services:
  filmshelf.api:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_HTTPS_PORTS=8081
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/home/app/.aspnet/https/filmshelf.pfx
      - ASPNETCORE_Kestrel__Certificates__Default__Password=Admin@123
    ports:
      - "8080:8080"
      - "8081:8081"
    depends_on:
      - movies-db
    networks:
      - filmshelf
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro
  movies-db:
    container_name: movies-db-container
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Admin@123"
    ports:
      - "1433:1433"
    volumes:
      - ./api/data:/var/opt/mssql/data
      - ./api/log:/var/opt/mssql/log
      - ./api/secrets:/var/opt/mssql/secrets
    networks:
      - filmshelf

networks:
  filmshelf:
